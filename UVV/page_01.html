<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">   
    <!-- charset = "conjunto de caracteres" ou "codificação de caracteres" # UTF-8 = nome de um padrão de codificação específico -->

    <meta http-equiv="X-UA-Compatible" content="IE=edge">   
    <!-- essa meta tag é usada para instruir navegadores mais antigos a usarem o modo de renderização mais recente disponível (Edge) para exibir a página, garantindo que o site se comporte de forma consistente -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">   
    <!-- diz aos navegadores dos celulares e tablets para: # width=device-width = a largura da página deve ser a largura do dispositivo # initial-scale=1.0 = o nível de zoom inicial deve ser 1.0, ou seja, sem zoom -->

    <title>Document</title>
</head>

<body>
    <h1>Minha página</h1>
    <p>Primeira Programação Web.</p>
</body>

</html>
